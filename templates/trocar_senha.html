{% extends "base.html" %}
{% block title %}Trocar Senha — Gerenciamento MIND{% endblock %}
{% block body %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="brand-icon brand-icon-lg">M</div>
            <h1>Trocar Senha</h1>
            <p class="auth-subtitle">Olá {{ usuario.nome }}, defina sua nova senha</p>
        </div>
        {% if erro %}
        <div class="alert alert-error">{{ erro }}</div>
        {% endif %}
        <form method="POST" class="auth-form" id="trocar-senha-form">
            <div class="form-group">
                <label for="nova">Nova senha</label>
                <input type="password" id="nova" name="nova" required minlength="6" placeholder="Mínimo 6 caracteres">
            </div>
            <div class="form-group">
                <label for="confirma">Confirmar senha</label>
                <input type="password" id="confirma" name="confirma" required placeholder="Repita a senha">
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="btn-trocar">Salvar Nova Senha</button>
        </form>
    </div>
</div>
{% endblock %}
