{% extends "base.html" %}
{% block title %}Login — Gerenciamento MIND{% endblock %}
{% block body %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="brand-icon brand-icon-lg">M</div>
            <h1>MIND</h1>
            <p class="auth-subtitle">Sistema de Gerenciamento de Projetos</p>
        </div>
        {% if erro %}
        <div class="alert alert-error">{{ erro }}</div>
        {% endif %}
        <form method="POST" class="auth-form" id="login-form">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required placeholder="seu@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required placeholder="••••••" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="btn-login">Entrar</button>
        </form>
    </div>
</div>
{% endblock %}
